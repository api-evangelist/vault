naftiko: "1.0.0-alpha1"

info:
  label: "HashiCorp Vault System Backend API"
  description: "HashiCorp Vault system backend API for managing auth methods, secrets engine mounts, policies, leases, and health monitoring."
  tags:
    - HashiCorp Vault
    - Secrets Management
    - System Administration
    - Security
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VAULT_TOKEN: VAULT_TOKEN
      VAULT_ADDR: VAULT_ADDR

capability:
  consumes:
    - type: http
      namespace: vault-sys
      baseUri: "{{VAULT_ADDR}}/v1"
      description: "HashiCorp Vault system backend REST API."
      authentication:
        type: apikey
        key: X-Vault-Token
        value: "{{VAULT_TOKEN}}"
        placement: header
      resources:
        - name: health
          path: /sys/health
          description: "Vault health and status monitoring."
          operations:
            - name: get-health
              method: GET
              description: "Check Vault health status including initialized, sealed, and standby state."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: auth-methods
          path: /sys/auth
          description: "Authentication method management."
          operations:
            - name: list-auth-methods
              method: GET
              description: "List all currently enabled authentication methods."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: enable-auth-method
              method: POST
              description: "Enable a new authentication method at the specified path."
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Mount path for the auth method."
                - name: type
                  in: body
                  type: string
                  required: true
                  description: "Auth method type (approle, kubernetes, ldap, etc.)."
                - name: description
                  in: body
                  type: string
                  required: false
                  description: "Human-friendly description."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  type: "{{tools.type}}"
                  description: "{{tools.description}}"

            - name: disable-auth-method
              method: DELETE
              description: "Disable an authentication method and revoke all associated tokens."
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Mount path of the auth method to disable."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: secrets-mounts
          path: /sys/mounts
          description: "Secrets engine mount management."
          operations:
            - name: list-secrets-mounts
              method: GET
              description: "List all mounted secrets engines."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: enable-secrets-engine
              method: POST
              description: "Mount a new secrets engine at the specified path."
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Mount path for the secrets engine."
                - name: type
                  in: body
                  type: string
                  required: true
                  description: "Secrets engine type (kv, aws, database, pki, transit, etc.)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  type: "{{tools.type}}"
                  description: "{{tools.description}}"

            - name: disable-secrets-engine
              method: DELETE
              description: "Unmount a secrets engine and revoke all associated secrets."
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Mount path of the secrets engine to disable."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: policies
          path: /sys/policies/acl
          description: "ACL policy management."
          operations:
            - name: list-policies
              method: GET
              description: "List all ACL policies."
              outputRawFormat: json
              outputParameters:
                - name: policies
                  type: array
                  value: "$.data.policies"

            - name: read-policy
              method: GET
              description: "Read an ACL policy by name."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Policy name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: write-policy
              method: POST
              description: "Create or update an ACL policy."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Policy name."
                - name: policy
                  in: body
                  type: string
                  required: true
                  description: "HCL policy document."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  policy: "{{tools.policy}}"

            - name: delete-policy
              method: DELETE
              description: "Delete an ACL policy."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Policy name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: leases
          path: /sys/leases
          description: "Lease lifecycle management."
          operations:
            - name: lookup-lease
              method: PUT
              description: "Look up a lease by ID to get TTL and expiration information."
              inputParameters:
                - name: lease_id
                  in: body
                  type: string
                  required: true
                  description: "Lease identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  lease_id: "{{tools.lease_id}}"

            - name: renew-lease
              method: PUT
              description: "Renew a lease to extend its TTL."
              inputParameters:
                - name: lease_id
                  in: body
                  type: string
                  required: true
                  description: "Lease identifier."
                - name: increment
                  in: body
                  type: integer
                  required: false
                  description: "Requested renewal duration in seconds."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  lease_id: "{{tools.lease_id}}"
                  increment: "{{tools.increment}}"

            - name: revoke-lease
              method: PUT
              description: "Revoke a lease and the associated dynamic secret."
              inputParameters:
                - name: lease_id
                  in: body
                  type: string
                  required: true
                  description: "Lease identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  lease_id: "{{tools.lease_id}}"
