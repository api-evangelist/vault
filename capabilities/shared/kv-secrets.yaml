naftiko: "1.0.0-alpha1"

info:
  label: "HashiCorp Vault KV Secrets Engine API"
  description: "HashiCorp Vault KV v2 secrets engine API for reading, writing, versioning, and managing secrets with metadata and lifecycle management."
  tags:
    - HashiCorp Vault
    - Secrets Management
    - KV Secrets
    - Security
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VAULT_TOKEN: VAULT_TOKEN
      VAULT_ADDR: VAULT_ADDR

capability:
  consumes:
    - type: http
      namespace: vault-kv
      baseUri: "{{VAULT_ADDR}}/v1"
      description: "HashiCorp Vault KV v2 secrets engine REST API."
      authentication:
        type: apikey
        key: X-Vault-Token
        value: "{{VAULT_TOKEN}}"
        placement: header
      resources:
        - name: kv-config
          path: /secret/config
          description: "KV v2 engine configuration."
          operations:
            - name: get-kv-config
              method: GET
              description: "Retrieve KV engine configuration including max versions and CAS settings."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: set-kv-config
              method: POST
              description: "Configure KV engine settings such as max versions and CAS required."
              inputParameters:
                - name: max_versions
                  in: body
                  type: integer
                  required: false
                  description: "Maximum number of versions to keep per secret."
                - name: cas_required
                  in: body
                  type: boolean
                  required: false
                  description: "Require CAS for all write operations."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  max_versions: "{{tools.max_versions}}"
                  cas_required: "{{tools.cas_required}}"

        - name: kv-data
          path: /secret/data/{path}
          description: "Secret data CRUD operations with versioning."
          operations:
            - name: read-secret
              method: GET
              description: "Read secret data and metadata for a given path. Returns latest version by default."
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Path to the secret."
                - name: version
                  in: query
                  type: integer
                  required: false
                  description: "Specific version to retrieve."
              outputRawFormat: json
              outputParameters:
                - name: data
                  type: object
                  value: "$.data.data"
                - name: metadata
                  type: object
                  value: "$.data.metadata"

            - name: write-secret
              method: POST
              description: "Create or update a secret. Each write creates a new version."
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Path to the secret."
                - name: data
                  in: body
                  type: object
                  required: true
                  description: "Key-value pairs to store."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  data: "{{tools.data}}"

            - name: delete-latest-secret-version
              method: DELETE
              description: "Soft delete the latest version of a secret."
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Path to the secret."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: kv-metadata
          path: /secret/metadata/{path}
          description: "Secret metadata and version history management."
          operations:
            - name: read-secret-metadata
              method: GET
              description: "Read metadata and version history for a secret."
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Path to the secret."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-secret-metadata
              method: DELETE
              description: "Permanently delete all metadata and versions for a secret."
              inputParameters:
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Path to the secret."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
